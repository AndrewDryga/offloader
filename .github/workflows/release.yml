name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push the image to GHCR
  id-token: write # cosign keyless (OIDC)

jobs:
  # A release must pass the full gate first.
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Image name + version (GHCR is lowercase; image tag is bare semver — strip the tag's v)
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tools/go.mod

      - name: Artifacts — helper binary, SBOM, checksums (release.sh, no image)
        run: SKIP_IMAGE=1 DIST=dist ./dev/scripts/release.sh "$VERSION"

      # QEMU registers binfmt handlers so buildx can cross-build the linux/arm64 image
      # on this amd64 runner (Apple Silicon can then pull it natively).
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          provenance: true
          sbom: true

      - name: Sign the image (cosign keyless)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Publish the GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Container image: `${{ env.IMAGE }}:${{ env.VERSION }}`
            Digest: `${{ steps.build.outputs.digest }}` (cosign keyless-signed).
            Verify: `cosign verify ${{ env.IMAGE }}:${{ env.VERSION }} --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com`
