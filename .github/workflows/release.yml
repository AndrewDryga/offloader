name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push the image to GHCR
  id-token: write # cosign keyless (OIDC)

jobs:
  # A release must pass the full gate first.
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod

      - name: Artifacts — helper binary, SBOM, checksums (release.sh, no image)
        run: SKIP_IMAGE=1 DIST=dist ./dev/scripts/release.sh "${VERSION#v}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          provenance: true
          sbom: true

      - name: Sign the image (cosign keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Publish the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Container image: `${{ env.IMAGE }}:${{ env.VERSION }}`
            Digest: `${{ steps.build.outputs.digest }}` (cosign keyless-signed).
            Verify: `cosign verify ${{ env.IMAGE }}:${{ env.VERSION }} --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com`
