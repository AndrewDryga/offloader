# Publishes the static marketing site + rendered docs (site/) to GitHub Pages,
# served at the custom domain offloader.dryga.com (CNAME + HTTPS already configured
# in repo settings; site/CNAME keeps the domain pinned on each deploy).
name: Deploy site to Pages

on:
  push:
    branches: [main]
    # Only redeploy when the published site actually changes.
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Let an in-flight deploy FINISH and queue the next (GitHub Pages'
# recommended setting): cancelling a deploy mid-flight fails it as "try again later", so two
# close pushes (e.g. a site edit + a release's version-pin bump) would race. With this, the
# running deploy completes and only the latest queued push runs after it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
