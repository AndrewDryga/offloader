name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: server (Elixir gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned to the toolchain the release image ships (server/Dockerfile).
      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          otp-version: "29.0.1"
          elixir-version: "1.20.1"

      - name: Cache deps and _build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: The gate — format, warnings-as-errors, tests + coverage floor
        working-directory: server
        run: |
          mix deps.get
          mix format --check-formatted
          mix compile --warnings-as-errors
          # --cover enforces the coverage floor in mix.exs (test_coverage threshold),
          # so a coverage regression fails CI, not just local runs.
          mix test --cover

  tools:
    name: tools (Go gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: The gate — gofmt, vet, test, build
        working-directory: tools
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt: files need formatting:"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...
          go build -o /tmp/offloader .

      - name: Config drift — the example projects validate with the tool
        working-directory: tools
        run: |
          go build -o /tmp/offloader .
          for p in ../examples/*/offloader.yml; do
            echo "validate $p"; /tmp/offloader validate --config "$p"
          done
          for m in ../examples/*/data/*/manifest.json; do
            echo "manifest $m"; /tmp/offloader manifest validate "$m"
          done

  docs:
    name: docs (presence + no overclaims)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: ./dev/scripts/docs-check.sh

  # Rolling `edge` image, published to GHCR once the gate is green — so the quickstart and
  # the site can `docker run ghcr.io/…/offloader:edge` against the latest main. Tagged
  # releases (versioned + `latest`, signed) are handled by release.yml, not here.
  publish-edge:
    name: publish edge image (GHCR)
    needs: [server, tools, docs]
    # Real pushes to main only — not PRs, and not when release.yml calls this via workflow_call.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Image name (GHCR requires lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # QEMU registers binfmt handlers so buildx can cross-build the linux/arm64 image
      # on this amd64 runner (Apple Silicon can then pull it natively).
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the rolling edge image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.img.outputs.name }}:edge
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
